<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>조감도작성</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main id="app">
      <canvas
        id="scene"
        title="왼쪽 드래그: 이동, 오른쪽 또는 Shift+드래그: 회전, 휠: 확대·축소"
      ></canvas>

      <section class="topbar">
        <div class="brand">
          <strong>조감도작성</strong>
          <span id="fileName">DXF를 불러오세요</span>
        </div>
        <div class="toolbar">
          <label class="crs-control">
            좌표계
            <select id="epsgSelect"></select>
          </label>
          <button id="openBtn" type="button">DXF 열기</button>
          <button id="editBtn" type="button" aria-pressed="false">간단 편집</button>
          <button id="undoBtn" type="button" disabled>되돌리기</button>
          <button id="exportDxfBtn" type="button">수정 DXF</button>
          <button id="exportKmzBtn" type="button" title="Google Earth용 KMZ 파일 저장">KMZ 내보내기</button>
          <button
            id="googleEarthBtn"
            class="primary-command"
            type="button"
            title="KMZ를 만들고 설치된 Google Earth Pro에서 열기"
          >Google Earth로 열기</button>
          <button
            id="captureBtn"
            type="button"
            title="Google Earth 창을 선택해 현재 뷰를 캡처"
          >조감도 캡처</button>
          <button id="saveBtn" type="button">PNG</button>
          <button id="regenBtn" type="button" title="DXF 곡선 정보를 다시 계산해 화면을 갱신">리젠</button>
          <button id="fitBtn" type="button" title="도면 전체가 보이도록 맞춤">화면 맞춤</button>
          <button id="viewBtn" type="button">3D</button>
          <input id="dxfInput" type="file" accept=".dxf,.dwg" hidden />
          <input id="stateInput" type="file" accept=".json,.aerial.json" hidden />
        </div>
      </section>

      <aside class="panel left-panel">
        <div class="panel-section">
          <h2>프로젝트</h2>
          <dl class="meta-grid">
            <div><dt>중심 위도</dt><dd id="centerLat">-</dd></div>
            <div><dt>중심 경도</dt><dd id="centerLon">-</dd></div>
            <div><dt>객체</dt><dd id="featureCount">-</dd></div>
            <div><dt>레이어</dt><dd id="layerCount">-</dd></div>
          </dl>
        </div>
        <div class="panel-section layer-section">
          <h2>레이어</h2>
          <div id="layerList" class="layer-list"></div>
        </div>
      </aside>

      <aside class="panel right-panel">
        <div class="panel-section">
          <h2>카메라</h2>
          <label>
            <span class="control-label">확대 <output id="zoomValue">-</output></span>
            <input id="zoomRange" type="range" min="0.05" max="12" step="0.01" />
          </label>
          <label>
            <span class="control-label">회전 <output id="yawValue">-</output></span>
            <input id="yawRange" type="range" min="-180" max="180" step="1" />
          </label>
          <label>
            <span class="control-label">기울기 <output id="pitchValue">-</output></span>
            <input id="pitchRange" type="range" min="0" max="78" step="1" />
          </label>
          <label>
            <span class="control-label">높이 표현 <output id="heightValue">-</output></span>
            <input id="heightRange" type="range" min="0" max="6" step="0.1" />
          </label>
        </div>

        <div class="panel-section slope-panel">
          <h2>경사분석</h2>
          <label>
            <span class="control-label">셀 크기 <output id="slopeCellValue">2m</output></span>
            <input id="slopeCellRange" type="range" min="1" max="10" step="1" value="2" />
          </label>
          <label>
            <span class="control-label">구간 상한값</span>
            <input id="slopeBreaksInput" type="text" value="5,10,16,17,25,30" />
          </label>
          <label>
            <span class="control-label">표시 투명도 <output id="slopeOpacityValue">58%</output></span>
            <input id="slopeOpacityRange" type="range" min="0.2" max="0.85" step="0.05" value="0.58" />
          </label>
          <div class="slope-actions">
            <button id="slopeAnalyzeBtn" type="button">분석</button>
            <button id="slopeToggleBtn" type="button" disabled>숨김</button>
            <button id="slopeClearBtn" type="button" disabled>삭제</button>
          </div>
          <div id="slopeLegend" class="slope-legend"></div>
          <p id="slopeStatus" class="slope-status">등고선 Z값이 있는 DXF를 불러온 뒤 분석하세요.</p>
        </div>

        <div id="editPanel" class="panel-section edit-panel" hidden>
          <h2>선택 객체 편집</h2>
          <p id="selectionText" class="selection-text">수정할 선을 클릭하세요.</p>

          <div class="transform-grid">
            <label>이동 X <input id="moveXInput" type="number" value="0" step="0.1" /></label>
            <label>이동 Y <input id="moveYInput" type="number" value="0" step="0.1" /></label>
            <label>이동 Z <input id="moveZInput" type="number" value="0" step="0.1" /></label>
            <label>회전(°) <input id="rotateInput" type="number" value="0" step="1" /></label>
            <label>크기(배) <input id="scaleInput" type="number" value="1" min="0.01" step="0.05" /></label>
          </div>
          <button id="applyTransformBtn" class="wide-command" type="button">선택 객체에 적용</button>

          <div id="hatchStyleControls" class="hatch-style-controls" hidden>
            <div class="hatch-style-grid">
              <label>
                면 색상
                <input id="hatchColorInput" type="color" value="#45c7d8" />
              </label>
              <label>
                투명도 <output id="hatchOpacityValue">40%</output>
                <input id="hatchOpacityRange" type="range" min="0.05" max="0.9" step="0.05" value="0.4" />
              </label>
            </div>
            <button id="applyHatchStyleBtn" class="wide-command" type="button">해치 색상 적용</button>
          </div>

          <div class="edit-actions three-actions">
            <button id="duplicateBtn" type="button">복사</button>
            <button id="deleteBtn" type="button">삭제</button>
            <button id="revertFeatureBtn" type="button">원본 복원</button>
          </div>

          <details class="advanced-edit">
            <summary>꼭짓점 좌표 직접 수정</summary>
            <div class="coordinate-grid">
              <label>X <input id="vertexXInput" type="number" step="0.001" /></label>
              <label>Y <input id="vertexYInput" type="number" step="0.001" /></label>
              <label>Z <input id="vertexZInput" type="number" step="0.001" /></label>
            </div>
            <button id="applyVertexBtn" class="wide-command" type="button">선택 꼭짓점 적용</button>
            <label class="all-z-control">
              선 전체 Z
              <input id="allZInput" type="number" step="0.1" />
            </label>
            <button id="applyAllZBtn" class="wide-command" type="button">선 전체 Z 적용</button>
          </details>

          <div class="project-actions">
            <button id="projectSaveBtn" type="button">작업 저장</button>
            <button id="projectLoadBtn" type="button">작업 열기</button>
          </div>
        </div>

        <div class="panel-section toggles">
          <label><input id="cadToggle" type="checkbox" checked /> CAD 도면</label>
          <label><input id="gridToggle" type="checkbox" checked /> 그리드</label>
          <label><input id="labelToggle" type="checkbox" /> 문자</label>
          <label><input id="weightToggle" type="checkbox" checked /> 선명한 선</label>
          <label><input id="hatchToggle" type="checkbox" checked /> 해치</label>
        </div>
      </aside>

      <footer class="statusbar">
        <span id="statusText">DXF 불러오는 중</span>
        <span id="cursorText">X -, Y -</span>
      </footer>

      <dialog id="captureDialog" class="capture-dialog">
        <div class="capture-header">
          <div>
            <strong>조감도 캡처</strong>
            <span id="captureInfo">Google Earth에서 선택한 현재 화면</span>
          </div>
          <button id="captureCloseBtn" class="icon-command" type="button" aria-label="닫기">×</button>
        </div>
        <div class="capture-stage">
          <img id="capturePreview" alt="Google Earth 조감도 캡처 미리보기" />
          <div id="captureEmpty" class="capture-empty">Google Earth 창을 선택하면 이곳에 캡처가 표시됩니다.</div>
        </div>
        <div class="capture-actions">
          <button id="captureAgainBtn" type="button">다시 캡처</button>
          <button id="captureSaveBtn" type="button" disabled>PNG 저장</button>
          <button
            id="captureCgBtn"
            class="primary-command"
            type="button"
            disabled
            title="OpenAI API 키 연결 후 사용할 수 있습니다."
          >CG 제작 · API 연결 필요</button>
        </div>
        <p class="capture-note">
          캡처 이미지는 현재 PC의 브라우저 메모리에만 보관됩니다. CG 제작 기능은 OpenAI API 연결 후 활성화됩니다.
        </p>
        <canvas id="captureCanvas" hidden></canvas>
      </dialog>

      <section hidden>
        <a id="kmlLink"></a>
        <input id="satelliteToggle" type="checkbox" />
        <input id="terrainToggle" type="checkbox" />
        <input id="satelliteOpacityRange" type="range" value="0" />
        <output id="satelliteOpacityValue"></output>
        <select id="satelliteZoomSelect"><option value="17">17</option></select>
        <span id="satelliteStatus"></span>
        <input id="elevationToggle" type="checkbox" />
      </section>
    </main>
    <script src="/static/app.js?v=slope-kmz-4"></script>
  </body>
</html>
